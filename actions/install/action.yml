name: Lazure install
description: Download and cache a lazure binary from GitHub releases.

inputs:
  version:
    description: Lazure release version to install, for example v0.7.0.
    required: true

runs:
  using: composite
  steps:
    - name: Cache lazure
      uses: actions/cache@v4
      with:
        path: ${{ runner.tool_cache }}/lazure/${{ inputs.version }}/${{ runner.os }}-${{ runner.arch }}
        key: lazure-${{ runner.os }}-${{ runner.arch }}-${{ inputs.version }}

    - name: Install lazure
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        LAZURE_VERSION: ${{ inputs.version }}
      run: bash "$ACTION_PATH/../_lib/install-lazure.sh"
