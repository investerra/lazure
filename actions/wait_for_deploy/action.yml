name: Lazure wait for deploy
description: Poll an app version endpoint until the deployed commit matches.

inputs:
  env:
    description: Target lazure environment, for example dev or prd.
    required: true
  dir:
    description: Directory containing deploy.yml and envs/.
    required: false
    default: deploy
  expected-sha:
    description: Expected commit SHA. Defaults to the workflow commit SHA.
    required: false
    default: ""
  path:
    description: Version endpoint path.
    required: false
    default: /version
  field:
    description: JSON field to compare.
    required: false
    default: commit
  timeout:
    description: Maximum time to wait.
    required: false
    default: 5m
  interval:
    description: Delay between checks.
    required: false
    default: 10s
  verbose:
    description: Enable lazure verbose logging.
    required: false
    default: "false"
  extra-args:
    description: Additional whitespace-separated arguments appended to lazure wait-for-deploy.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Wait for deploy
      shell: bash
      working-directory: ${{ github.workspace }}
      env:
        ACTION_PATH: ${{ github.action_path }}
        LAZURE_ENV: ${{ inputs.env }}
        LAZURE_DIR: ${{ inputs.dir }}
        LAZURE_EXPECTED_SHA: ${{ inputs.expected-sha }}
        LAZURE_PATH: ${{ inputs.path }}
        LAZURE_FIELD: ${{ inputs.field }}
        LAZURE_TIMEOUT: ${{ inputs.timeout }}
        LAZURE_INTERVAL: ${{ inputs.interval }}
        LAZURE_VERBOSE: ${{ inputs.verbose }}
        LAZURE_EXTRA_ARGS: ${{ inputs.extra-args }}
      run: bash "$ACTION_PATH/../_lib/run-wait-for-deploy.sh"
