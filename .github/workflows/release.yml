name: release

# Triggered by both semver and calver tag pushes. lazure uses calver
# (v{YYYYMMDD}.N) in its own `release` command, but keep semver support
# in case a future contributor pushes a semver tag manually.
on:
  push:
    tags:
      - "v*.*.*"
      - "v[0-9]*"

# Needed for goreleaser-action to create the GitHub Release + upload
# assets. No other privileges required.
permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          # Full history so goreleaser can read the commit graph for its
          # changelog generator (based on git log between tags).
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
