name: release

# Triggered by semver tag pushes. Tags are usually cut via the
# `tag-release` workflow (workflow_dispatch) which computes the next
# semver + auto-generates a changelog, but manually-pushed v*.*.* tags
# work identically.
on:
  push:
    tags:
      - "v*.*.*"

# Needed for goreleaser-action to create the GitHub Release + upload
# assets. No other privileges required.
permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          # Full history so goreleaser can read the commit graph for its
          # changelog generator (based on git log between tags).
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
