name: release

# Runs goreleaser to build and publish a release. Triggered by:
#   - semver tag pushes (manual `git push origin v1.2.3`)
#   - workflow_dispatch with a tag ref (called by tag-release.yml,
#     because tags pushed by the default GITHUB_TOKEN don't trigger
#     downstream workflows — an anti-recursion safety measure)
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "tag to release (e.g. v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          # When invoked via workflow_dispatch we must check out the
          # tag ref rather than the default branch.
          ref: ${{ inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
