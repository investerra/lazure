name: tag-release

# Manually-triggered release cutter. Computes the next semver tag based
# on the selected bump type, generates a changelog from the git log
# since the previous tag, pushes the tag, then dispatches release.yml
# for that tag (the tag push itself wouldn't trigger release.yml
# because the default GITHUB_TOKEN suppresses downstream workflows).

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "version bump"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  actions: write # needed to dispatch release.yml at the end

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail
          latest=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi
          ver=${latest#v}
          IFS=. read -r maj min pat <<< "$ver"
          case "$BUMP" in
            major) maj=$((maj + 1)); min=0; pat=0 ;;
            minor) min=$((min + 1)); pat=0 ;;
            patch) pat=$((pat + 1)) ;;
            *) echo "unknown bump: $BUMP" >&2; exit 1 ;;
          esac
          new="v${maj}.${min}.${pat}"
          echo "previous=$latest" >> "$GITHUB_OUTPUT"
          echo "new=$new" >> "$GITHUB_OUTPUT"
          echo "Bumping $latest → $new"

      - name: Generate changelog
        id: changelog
        env:
          PREVIOUS: ${{ steps.version.outputs.previous }}
        run: |
          set -euo pipefail
          if [ "$PREVIOUS" = "v0.0.0" ]; then
            body=$(git log --pretty='- %s' -n 50 HEAD)
            total=$(git rev-list --count HEAD)
            if [ "$total" -gt 50 ]; then
              body="${body}"$'\n'"... and $((total - 50)) more"
            fi
          else
            body=$(git log "${PREVIOUS}..HEAD" --pretty='- %s')
          fi
          if [ -z "$body" ]; then
            body="(no changes)"
          fi
          # Random heredoc delimiter so a commit subject containing the
          # literal string "EOF_CHANGELOG" can't terminate the heredoc
          # early and inject arbitrary GitHub Actions output. /dev/urandom
          # is available on every GH-hosted runner.
          delim="EOF_$(head -c 16 /dev/urandom | xxd -p)"
          {
            printf 'body<<%s\n' "$delim"
            printf '%s\n' "$body"
            printf '%s\n' "$delim"
          } >> "$GITHUB_OUTPUT"
          echo "---- changelog ----"
          echo "$body"

      - name: Create and push tag
        env:
          NEW: ${{ steps.version.outputs.new }}
          BODY: ${{ steps.changelog.outputs.body }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW" -m "$NEW" -m "$BODY"
          git push origin "$NEW"
          echo "Pushed $NEW."

      - name: Dispatch release workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW: ${{ steps.version.outputs.new }}
        run: |
          set -euo pipefail
          # Manual chain — a tag push from GITHUB_TOKEN won't trigger
          # release.yml on its own, so we explicitly dispatch it.
          gh workflow run release.yml --ref "$NEW" -f tag="$NEW"
          echo "Dispatched release.yml for $NEW — goreleaser will build and publish assets."
